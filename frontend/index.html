<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BotMakers - The Arena Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

    <!-- ========== HEADER / NAVIGATION ========== -->
    <header>
        <div class="container">
            <div class="logo">
                <h1>BotMakers</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#arena">The Arena</a></li>
                    <li><a href="#episodes">Episodes</a></li>
                    <li><a href="#ranking">National Ranking</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <button class="btn-outline">Sign In</button>
                <button class="btn-primary">Join Now</button>
            </div>
        </div>
    </header>

    <!-- ========== HERO SECTION ========== -->
    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1>Compete with confidence<br /><span>under strain</span></h1>
                <p>Benchmark your skills on India's office</p>
                <button class="btn-primary">Get Started</button>
            </div>
        </div>
    </section>

    <!-- ========== ARENA SECTION ========== -->
    <section class="arena" id="arena">
        <div class="container">
            <h2>The Arena</h2>
            <div class="arena-cards">
                <!-- Cards will be inserted here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- ========== EPISODES SECTION ========== -->
    <section class="episodes" id="episodes">
        <div class="container">
            <h2>Episodes</h2>
            <div class="episode-grid">
                <!-- Episodes will be inserted here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- ========== RANKING SECTION ========== -->
    <section class="ranking" id="ranking">
        <div class="container">
            <h2>National Ranking</h2>
            <div class="ranking-table">
                <!-- Ranking table will be inserted here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- ========== FOOTER ========== -->
    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="#">Join the Team</a>
                <a href="#">Sponsorships</a>
                <a href="#">Help Center</a>
            </div>
            <p>&copy; 2026 BotMakers. All rights reserved.</p>
        </div>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
